<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing Database</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main>
    <article class="product-card" itemscope itemtype="https://schema.org/Product">
  <section class="product-card__image">
    <figure>
      <img 
        src="https://images.unsplash.com/photo-1541643600914-78b084683601?q=80&w=704&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" 
        alt="Premium product showcase - high-quality item display"
        loading="lazy"
        width="704"
        height="470"
      >
    </figure>
  </section>

  <div class="product-card__content">
    <h2 class="product-card__title" itemprop="name">Premium Product Name</h2>
    
    <p class="product-card__description" itemprop="description">
      Detailed product description highlighting key features and benefits for customers.
    </p>

    <div class="product-card__meta" itemprop="offers" itemscope itemtype="https://schema.org/Offer">
      <span itemprop="priceCurrency" content="USD" class="sr-only">USD</span>
      <span itemprop="price" class="product-card__price">$99.99</span>
    </div>
  </div>

  <a 
    href="https://wa.me/1234567890?text=I%20am%20interested%20in%20Premium%20Product%20Name"
    class="product-card__cta"
    aria-label="Contact us via WhatsApp to purchase Premium Product Name"
    target="_blank"
    rel="noopener noreferrer"
  >
    <button class="btn btn--primary" type="button">
      <span class="btn__icon">💬</span>
      <span class="btn__text">Buy Now via WhatsApp</span>
    </button>
  </a>
</article>
